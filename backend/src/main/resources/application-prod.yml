spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      database: ${SPRING_DATA_MONGODB_DATABASE}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}

provider:
  base-url: ${PROVIDER_BASE_URL}
  api-key: ${PROVIDER_API_KEY}
  callback-base-url: ${PROVIDER_CALLBACK_BASE_URL}

polling:
  enabled: ${POLLING_ENABLED:true}
  interval-ms: ${POLLING_INTERVAL_MS:60000}
  batch-size: ${POLLING_BATCH_SIZE:10}
  base-delay-seconds: ${POLLING_BASE_DELAY_SECONDS:60}
  max-delay-seconds: ${POLLING_MAX_DELAY_SECONDS:900}

schedules:
  execution:
    enabled: ${SCHEDULE_EXECUTION_ENABLED:true}
    interval-ms: ${SCHEDULE_EXECUTION_INTERVAL_MS:60000}
    batch-size: ${SCHEDULE_EXECUTION_BATCH_SIZE:10}
