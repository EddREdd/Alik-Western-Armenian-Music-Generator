spring:
  config:
    activate:
      on-profile: dev
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017}
      database: ${SPRING_DATA_MONGODB_DATABASE:alike_db}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

features:
  provider-submission-enabled: ${FEATURE_PROVIDER_SUBMISSION_ENABLED:false}

auth:
  expose-otp-in-response: ${AUTH_EXPOSE_OTP_IN_RESPONSE:true}
  default-invite-code: ${AUTH_DEFAULT_INVITE_CODE:BALIANS-INVITE}
  google-oauth-enabled: ${AUTH_GOOGLE_OAUTH_ENABLED:false}
  google-client-id: ${AUTH_GOOGLE_CLIENT_ID:}
