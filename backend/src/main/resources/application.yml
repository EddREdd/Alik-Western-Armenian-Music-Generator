server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:musicgen-backend}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:}
      database: ${SPRING_DATA_MONGODB_DATABASE:alike_db}
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

app:
  name: ${APP_NAME:musicgen-backend}

media:
  storage:
    type: ${MEDIA_STORAGE_TYPE:local}
    root-path: ${MEDIA_STORAGE_ROOT_PATH:storage}
    public-base-url: ${MEDIA_STORAGE_PUBLIC_BASE_URL:http://localhost:${SERVER_PORT:8080}}
    spaces-endpoint: ${DO_SPACES_ENDPOINT:${MEDIA_STORAGE_SPACES_ENDPOINT:}}
    spaces-region: ${DO_SPACES_REGION:${MEDIA_STORAGE_SPACES_REGION:}}
    spaces-bucket: ${DO_SPACES_BUCKET:${MEDIA_STORAGE_SPACES_BUCKET:}}
    spaces-access-key: ${DO_SPACES_ACCESS_KEY:${MEDIA_STORAGE_SPACES_ACCESS_KEY:}}
    spaces-secret-key: ${DO_SPACES_SECRET_KEY:${MEDIA_STORAGE_SPACES_SECRET_KEY:}}
    spaces-public-base-url: ${DO_SPACES_PUBLIC_BASE_URL:${MEDIA_STORAGE_SPACES_PUBLIC_BASE_URL:}}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

provider:
  base-url: ${PROVIDER_BASE_URL:https://api.sunoapi.org}
  api-key: ${PROVIDER_API_KEY:}
  callback-base-url: ${PROVIDER_CALLBACK_BASE_URL:http://localhost:${SERVER_PORT:8080}}

polling:
  enabled: ${POLLING_ENABLED:true}
  interval-ms: ${POLLING_INTERVAL_MS:60000}
  batch-size: ${POLLING_BATCH_SIZE:10}
  base-delay-seconds: ${POLLING_BASE_DELAY_SECONDS:60}
  max-delay-seconds: ${POLLING_MAX_DELAY_SECONDS:900}

schedules:
  execution:
    enabled: ${SCHEDULE_EXECUTION_ENABLED:true}
    interval-ms: ${SCHEDULE_EXECUTION_INTERVAL_MS:60000}
    batch-size: ${SCHEDULE_EXECUTION_BATCH_SIZE:10}

ops:
  stuck-threshold-minutes: ${OPS_STUCK_THRESHOLD_MINUTES:30}
  raw-payload-preview-length: ${OPS_RAW_PAYLOAD_PREVIEW_LENGTH:200}

auth:
  session-ttl-hours: ${AUTH_SESSION_TTL_HOURS:168}
  otp-ttl-minutes: ${AUTH_OTP_TTL_MINUTES:10}
  expose-otp-in-response: ${AUTH_EXPOSE_OTP_IN_RESPONSE:false}
  default-invite-code: ${AUTH_DEFAULT_INVITE_CODE:}
  google-oauth-enabled: ${AUTH_GOOGLE_OAUTH_ENABLED:false}
  google-client-id: ${AUTH_GOOGLE_CLIENT_ID:}
  google-token-info-url: ${AUTH_GOOGLE_TOKEN_INFO_URL:https://oauth2.googleapis.com/tokeninfo}
  max-users: ${AUTH_MAX_USERS:100}
  standard-credits: ${AUTH_STANDARD_CREDITS:50}
  admin-emails: ${AUTH_ADMIN_EMAILS:}

email:
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}
    from-address: ${SENDGRID_FROM_ADDRESS:alikfoundation@gmail.com}
    from-name: ${SENDGRID_FROM_NAME:Alik Music}

features:
  provider-submission-enabled: ${FEATURE_PROVIDER_SUBMISSION_ENABLED:true}
  callback-processing-enabled: ${FEATURE_CALLBACK_PROCESSING_ENABLED:true}
  admin-endpoints-enabled: ${FEATURE_ADMIN_ENDPOINTS_ENABLED:true}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
