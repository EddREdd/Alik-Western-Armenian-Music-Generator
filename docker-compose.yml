services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      APP_NAME: ${APP_NAME:-musicgen-backend}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI}
      SPRING_DATA_MONGODB_DATABASE: ${SPRING_DATA_MONGODB_DATABASE:-alike_db}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://alik-app-mw9ydy-fcf9d6-95-140-192-45.traefik.me}
      FEATURE_PROVIDER_SUBMISSION_ENABLED: ${FEATURE_PROVIDER_SUBMISSION_ENABLED:-false}
      FEATURE_CALLBACK_PROCESSING_ENABLED: ${FEATURE_CALLBACK_PROCESSING_ENABLED:-true}
      FEATURE_ADMIN_ENDPOINTS_ENABLED: ${FEATURE_ADMIN_ENDPOINTS_ENABLED:-true}
      PROVIDER_BASE_URL: ${PROVIDER_BASE_URL:-https://api.sunoapi.org}
      PROVIDER_API_KEY: ${PROVIDER_API_KEY}
      PROVIDER_CALLBACK_BASE_URL: ${PROVIDER_CALLBACK_BASE_URL:-http://alik-app-mw9ydy-a5a9ab-95-140-192-45.traefik.me:8080}
      MEDIA_STORAGE_TYPE: ${MEDIA_STORAGE_TYPE:-spaces}
      MEDIA_STORAGE_SPACES_ENDPOINT: ${MEDIA_STORAGE_SPACES_ENDPOINT}
      MEDIA_STORAGE_SPACES_REGION: ${MEDIA_STORAGE_SPACES_REGION}
      MEDIA_STORAGE_SPACES_BUCKET: ${MEDIA_STORAGE_SPACES_BUCKET}
      MEDIA_STORAGE_SPACES_ACCESS_KEY: ${MEDIA_STORAGE_SPACES_ACCESS_KEY}
      MEDIA_STORAGE_SPACES_SECRET_KEY: ${MEDIA_STORAGE_SPACES_SECRET_KEY}
      MEDIA_STORAGE_SPACES_PUBLIC_BASE_URL: ${MEDIA_STORAGE_SPACES_PUBLIC_BASE_URL}
      AUTH_ADMIN_EMAILS: ${AUTH_ADMIN_EMAILS:-admin@balians.local}
      AUTH_DEFAULT_INVITE_CODE: ${AUTH_DEFAULT_INVITE_CODE:-BALIANS-INVITE}
      AUTH_EXPOSE_OTP_IN_RESPONSE: ${AUTH_EXPOSE_OTP_IN_RESPONSE:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_ADDRESS: ${SENDGRID_FROM_ADDRESS:-alikfoundation@gmail.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Alik Music}
    expose:
      - "8080"
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://alik-app-mw9ydy-a5a9ab-95-140-192-45.traefik.me:8080}
        INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://alik-app-mw9ydy-a5a9ab-95-140-192-45.traefik.me:8080}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://alik-app-mw9ydy-a5a9ab-95-140-192-45.traefik.me:8080}
      INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://alik-app-mw9ydy-a5a9ab-95-140-192-45.traefik.me:8080}
      NEXT_PUBLIC_DEFAULT_PROJECT_ID: ${NEXT_PUBLIC_DEFAULT_PROJECT_ID:-project-1}
    expose:
      - "3000"

