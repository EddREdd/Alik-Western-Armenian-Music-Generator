services:
  backend:
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FEATURE_PROVIDER_SUBMISSION_ENABLED: ${FEATURE_PROVIDER_SUBMISSION_ENABLED:-true}
      PROVIDER_CALLBACK_BASE_URL: ${PROVIDER_CALLBACK_BASE_URL:-http://localhost:8080}

  frontend:
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080}
      INTERNAL_BACKEND_URL: ${INTERNAL_BACKEND_URL:-http://backend:8080}
